<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동화면세점 기획전 1</title>

  <!-- GA4 Scroll-depth tracking placeholder -->
  <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script> -->

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      background: #111;
      display: flex;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 800px;
      background: #fff;
      position: relative;
    }

    /* ── Zero-gap image rule (global) ── */
    img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
      border: none;
    }

    /* ── Top banner wrapper ── */
    #top-banner {
      width: 100%;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ① Top banner (lang별 이미지 / from 있을 경우 from+lang 조합) -->
  <section id="top-banner">
    <img id="top-banner-img" src="top_banner_kr.jpg" alt="상단 배너" />
  </section>

  <!-- ② Content 1~7 -->
  <section id="content1"><img id="content1-img"   src="content1_kr.jpg"  alt="기획전 1 콘텐츠 1"  /></section>
  <section id="content2"><img id="content2-img"   src="content2_kr.jpg"  alt="기획전 1 콘텐츠 2"  /></section>
  <section id="content3"><img id="content3-img"   src="content3_kr.jpg"  alt="기획전 1 콘텐츠 3"  /></section>
  <section id="content4"><img id="content4-img"   src="content4_kr.jpg"  alt="기획전 1 콘텐츠 4"  /></section>
  <section id="content5"><img id="content5-img"   src="content5_kr.jpg"  alt="기획전 1 콘텐츠 5"  /></section>
  <section id="content6"><img id="content6-img"   src="content6_kr.jpg"  alt="기획전 1 콘텐츠 6"  /></section>
  <section id="content7"><img id="content7-img"   src="content7_kr.jpg"  alt="기획전 1 콘텐츠 7"  /></section>

  <!-- ④ Coupon -->
  <section id="coupon">
    <img id="coupon-img" src="coupon_kr.jpg" alt="쿠폰" />
  </section>

</div><!-- /#app -->

<script>
(function () {
  /* ────────────────────────────────────────────
     1. Read URL parameters
  ──────────────────────────────────────────── */
  const params  = new URLSearchParams(window.location.search);
  const lang    = params.get('lang') || 'kr';    // default: kr
  const fromKey = params.get('from') || '면세점';  // default: 면세점

  /* ────────────────────────────────────────────
     2. Top banner 이미지 결정
        - from 파라미터 있으면 → top_banner_{from}_{lang}.jpg
        - from 없으면(기본)   → top_banner_{lang}.jpg
  ──────────────────────────────────────────── */
  const topBannerSrc = fromKey !== '면세점'
    ? 'top_banner_' + fromKey + '_' + lang + '.jpg'
    : 'top_banner_' + lang + '.jpg';
  document.getElementById('top-banner-img').src = topBannerSrc;

  /* ────────────────────────────────────────────
     3. Image asset map (lang별 교체 대상)
  ──────────────────────────────────────────── */
  const assets = {
    content1:  { kr: 'content1_kr.jpg',  en: 'content1_en.jpg',  ch: 'content1_ch.jpg'  },
    content2:  { kr: 'content2_kr.jpg',  en: 'content2_en.jpg',  ch: 'content2_ch.jpg'  },
    content3:  { kr: 'content3_kr.jpg',  en: 'content3_en.jpg',  ch: 'content3_ch.jpg'  },
    content4:  { kr: 'content4_kr.jpg',  en: 'content4_en.jpg',  ch: 'content4_ch.jpg'  },
    content5:  { kr: 'content5_kr.jpg',  en: 'content5_en.jpg',  ch: 'content5_ch.jpg'  },
    content6:  { kr: 'content6_kr.jpg',  en: 'content6_en.jpg',  ch: 'content6_ch.jpg'  },
    content7:  { kr: 'content7_kr.jpg',  en: 'content7_en.jpg',  ch: 'content7_ch.jpg'  },
    coupon:    { kr: 'coupon_kr.jpg',    en: 'coupon_en.jpg',    ch: 'coupon_ch.jpg'    }
  };

  /* ────────────────────────────────────────────
     4. Swap images based on lang
  ──────────────────────────────────────────── */
  function setImg(id, assetKey) {
    const el  = document.getElementById(id);
    const map = assets[assetKey];
    if (el && map) el.src = map[lang] || map.kr;
  }

  for (var i = 1; i <= 7; i++) {
    setImg('content' + i + '-img', 'content' + i);
  }
  setImg('coupon-img', 'coupon');

})();
</script>
</body>
</html>
